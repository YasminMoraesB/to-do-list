<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/imgs/icons8-estrela-16.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Pixelify+Sans:wght@400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Press+Start+2P&family=Quicksand:wght@300..700&family=Sansita+Swashed:wght@300..900&family=Tiny5&display=swap" rel="stylesheet">
    <title>Lista de Tarefas</title>
</head>
<body>
    <main>
        <!--div principal-->
        <div class="todo-list"> 
            <!--div da barra de cima-->
            <div class="barra-de-cima">
                <h3>To-do list</h3>
                <div class="botoes">
                    <img src="/imgs/icons8-subtração-100.png" alt="subtracão">
                </div>
                <div class="botoes">
                    <img src="/imgs/icons8-janela-96.png" alt="janela">
                </div>
                <div class="botoes"> <img src="/imgs/icons8-x-100.png" alt="fechar">
                </div>
                
            </div>
            
            <div class="arquivos">
                <p><u>F</u>ile</p>
                <p><u>E</u>dit</p>
                <p><u>V</u>iew</p>
                <p><u>H</u>elp</p>
            </div>
            
            <div class="input-container">
                <input type="text" id="taskInput" placeholder="Digite sua tarefa...">
                <button id="addButton">Adicionar</button>

                    <ul id="taskList">
                    </ul>
            </div>


        </div>
    </main>
</body>
<script src="script.js"></script>
</html>
